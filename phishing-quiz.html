<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Quiz Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .quiz-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .quiz-header {
            background: white;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .quiz-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .quiz-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .quiz-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
        .quiz-card.level-1 {
            border-left: 5px solid #10b981;
        }
        .quiz-card.level-2 {
            border-left: 5px solid #f59e0b;
        }
        .quiz-card.level-3 {
            border-left: 5px solid #ef4444;
        }
        .quiz-card.level-4 {
            border-left: 5px solid #8b5cf6;
        }
        .quiz-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        .quiz-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }
        .module-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .module-badge.level-1 {
            background: #d1fae5;
            color: #065f46;
        }
        .module-badge.level-2 {
            background: #fed7aa;
            color: #92400e;
        }
        .module-badge.level-3 {
            background: #fee2e2;
            color: #7f1d1d;
        }
        .module-badge.level-4 {
            background: #ede9fe;
            color: #5b21b6;
        }
        .question-count {
            background: #e5e7eb;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #4b5563;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            overflow-y: auto;
        }
        .modal.active {
            display: block;
        }
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover {
            color: black;
        }
        .question-item {
            background: #f9fafb;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }
        .question-id {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 8px;
        }
        .question-text {
            margin-bottom: 10px;
            font-weight: 500;
        }
        .options-list {
            margin-left: 20px;
            margin-bottom: 10px;
        }
        .option-item {
            padding: 5px 0;
            font-size: 0.9rem;
            color: #555;
        }
        .answer-indicator {
            color: #10b981;
            font-weight: bold;
            font-size: 0.85rem;
        }
        .type-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.75rem;
            font-weight: 600;
            background: #dbeafe;
            color: #1e40af;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="quiz-header">
            <h1 class="text-4xl font-bold text-gray-800 mb-4">📚 Phishing Quiz Bank</h1>
            <p class="text-gray-600 text-lg">Interactive Phishing & Security Awareness Training</p>
            <p class="text-gray-500 text-sm mt-4">Click on any quiz below to view all questions and answers</p>
        </div>

        <div class="quiz-list" id="quizList"></div>
    </div>

    <!-- Modal for showing questions -->
    <div id="questionModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let quizData = [];

        // Load quiz data
        async function loadQuizData() {
            try {
                const response = await fetch('quiz_data.json');
                if (!response.ok) throw new Error('Failed to load quiz data');
                const data = await response.json();
                quizData = data.quiz_bank;
                displayQuizzes();
            } catch (error) {
                console.error('Error loading quiz data:', error);
                document.getElementById('quizList').innerHTML = '<p class="text-red-500">Error loading quiz data. Please ensure quiz_data.json is in the same folder.</p>';
            }
        }

        function displayQuizzes() {
            const quizList = document.getElementById('quizList');
            quizList.innerHTML = '';

            quizData.forEach(quiz => {
                const levelClass = quiz.module.replace(/\s+/g, '-').toLowerCase();
                const card = document.createElement('div');
                card.className = `quiz-card ${levelClass}`;
                card.onclick = () => showQuestions(quiz);

                const questionCount = quiz.questions.length;
                const badgeText = quiz.module.replace('-', ' ');

                card.innerHTML = `
                    <div class="quiz-title">${quiz.title}</div>
                    <div class="quiz-meta">
                        <span class="module-badge ${levelClass}">${badgeText}</span>
                        <span class="question-count">${questionCount} Q's</span>
                    </div>
                `;

                quizList.appendChild(card);
            });
        }

        function showQuestions(quiz) {
            const modal = document.getElementById('questionModal');
            const modalBody = document.getElementById('modalBody');
            
            let html = `<h2 class="text-2xl font-bold mb-4">${quiz.title}</h2>`;
            html += `<p class="text-gray-600 mb-6">Module: <strong>${quiz.module}</strong> | Questions: ${quiz.questions.length}</p>`;

            quiz.questions.forEach((question, index) => {
                html += `
                    <div class="question-item">
                        <div class="question-id">Question ${index + 1} (ID: ${question.id})</div>
                        <div class="type-badge">${question.type.toUpperCase()}</div>
                        <div class="question-text">${question.questionText}</div>
                        <div class="options-list">
                `;

                question.options.forEach((option, optIndex) => {
                    const isAnswer = question.answer === optIndex;
                    const answerClass = isAnswer ? 'answer-indicator' : '';
                    const answerText = isAnswer ? ' ✓ ANSWER' : '';
                    html += `<div class="option-item"><strong>○</strong> ${option} <span class="${answerClass}">${answerText}</span></div>`;
                });

                html += `</div>`;
                if (question.feedback && question.feedback[question.answer]) {
                    html += `<div style="margin-top: 10px; padding: 10px; background: #f0fdf4; border-left: 3px solid #10b981; font-size: 0.9rem;"><strong>Feedback:</strong> ${question.feedback[question.answer]}</div>`;
                }
                html += `</div>`;
            });

            modalBody.innerHTML = html;
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('questionModal').classList.remove('active');
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('questionModal');
            if (event.target === modal) {
                modal.classList.remove('active');
            }
        }

        // Load data on page load
        loadQuizData();
    </script>
</body>
</html>
